<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arc path: from 10 o'clock (34,62) to 5 o'clock (138,166) clockwise through top -->
    <path id="logoArc" d="M 34,62 A 76,76 0 1,1 138,166"/>
  </defs>

  <!-- Subtle background oval (brushstroke feel) -->
  <ellipse cx="104" cy="106" rx="58" ry="50" fill="#F0EBE4" opacity="0.55"/>

  <!-- Circle arc: 10 o'clock → 5 o'clock (through top & right) -->
  <path d="M 34,62 A 76,76 0 1,1 138,166" stroke="#2C2420" stroke-width="0.9" fill="none" opacity="0.45"/>
  <!-- Circle arc: 5 o'clock → 8 o'clock (short segment before branch) -->
  <path d="M 138,166 A 76,76 0 0,1 34,138" stroke="#2C2420" stroke-width="0.9" fill="none" opacity="0.45"/>

  <!-- Text on arc -->
  <text font-family="Montserrat, Arial, sans-serif" font-size="11" fill="#2C2420" letter-spacing="3.5" font-weight="600">
    <textPath href="#logoArc" startOffset="15%">FED.NAILS.FED</textPath>
  </text>

  <!-- Large F -->
  <text x="100" y="134"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="98"
    font-weight="400"
    fill="#2C2420"
    text-anchor="middle">F</text>

  <!-- Botanical branch starting at 8 o'clock point (34, 138) -->
  <!-- Main stem going down-left -->
  <path d="M 34,138 C 30,148 25,159 20,170" stroke="#2C2420" stroke-width="1.3" stroke-linecap="round" fill="none"/>

  <!-- Branch 1 (upper left) -->
  <path d="M 30,147 C 21,143 17,136 20,128" stroke="#2C2420" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M 20,128 C 15,121 17,115 22,119 C 21,123 20,128 20,128Z" fill="#2C2420" opacity="0.8"/>

  <!-- Branch 2 (middle left) -->
  <path d="M 26,156 C 17,152 13,144 16,136" stroke="#2C2420" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M 16,136 C 11,129 13,123 18,127 C 17,131 16,136 16,136Z" fill="#2C2420" opacity="0.8"/>

  <!-- Small branch going right -->
  <path d="M 28,152 C 35,147 37,140 33,135" stroke="#2C2420" stroke-width="0.9" stroke-linecap="round" fill="none"/>

  <!-- Berries / small round dots -->
  <circle cx="20" cy="120" r="2.2" fill="#2C2420" opacity="0.72"/>
  <circle cx="17" cy="137" r="2.2" fill="#2C2420" opacity="0.72"/>
  <circle cx="33" cy="135" r="1.8" fill="#2C2420" opacity="0.65"/>
  <circle cx="20" cy="170" r="2.5" fill="#2C2420" opacity="0.72"/>
  <circle cx="25" cy="164" r="1.8" fill="#2C2420" opacity="0.62"/>
  <circle cx="16" cy="175" r="1.8" fill="#2C2420" opacity="0.62"/>
</svg>
